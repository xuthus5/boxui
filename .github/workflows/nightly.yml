name: nightly

on:
  push:
    branches: [main]

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install frontend deps
        run: npm ci --prefix ui
      - name: Compute nightly version
        id: version
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          date_utc="$(date -u +%Y%m%d)"
          version="nightly-${date_utc}-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
      - name: Package Linux amd64 nightly
        run: ./scripts/package-release.sh "${{ steps.version.outputs.version }}" release
      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boxd-nightly-linux-amd64
          path: |
            release/boxd_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            release/boxd_${{ steps.version.outputs.version }}_linux_amd64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
      - name: Update rolling nightly GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          generate_release_notes: false
          body: |
            Rolling nightly build from `main`.

            - Commit: `${{ github.sha }}`
            - Version: `${{ steps.version.outputs.version }}`
            - Built at: `${{ github.event.head_commit.timestamp }}`

            This release is overwritten by each successful main push.
          files: |
            release/boxd_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            release/boxd_${{ steps.version.outputs.version }}_linux_amd64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute image tags
        id: meta
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          date_utc="$(date -u +%Y%m%d)"
          version="nightly-${date_utc}-${short_sha}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${image}:nightly"
            echo "${image}:nightly-${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
