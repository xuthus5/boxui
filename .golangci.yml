version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
  exclusions:
    paths:
      - ui/node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/xuthus5/boxd

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
