name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies and tools
        run: |
          npm ci --prefix ui
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run release quality gates
        run: |
          make check-go
          make check-ui
          make check-embedded-ui
          npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org --prefix ui
      - name: Package Linux amd64 release
        run: ./scripts/package-release.sh "${GITHUB_REF_NAME}" release
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: bin/boxd
          format: spdx-json
          output-file: release/boxd_${{ github.ref_name }}_linux_amd64.spdx.json
          artifact-name: boxd-${{ github.ref_name }}-sbom
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/boxd_${{ github.ref_name }}_linux_amd64.tar.gz
            release/boxd_${{ github.ref_name }}_linux_amd64.tar.gz.sha256
            release/boxd_${{ github.ref_name }}_linux_amd64.spdx.json
      - name: Docker metadata
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME}"
          version_no_v="${version#v}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${image}:${version}"
            echo "${image}:${version_no_v}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
